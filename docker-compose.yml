services:
  postgres:
    image: postgres:16
    container_name: deploy-track-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: deploytrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - deploy_track_postgres_data:/var/lib/postgresql/data

volumes:
  deploy_track_postgres_data: